<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡卡西雷切 AR - 高灵敏触发版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        
        #webcam {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; transform: scaleX(-1); z-index: 1;
        }

        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2; pointer-events: none; mix-blend-mode: screen; 
        }

        .lil-gui { pointer-events: auto !important; z-index: 100 !important; }

        /* 面部遮罩强制隐藏 */
        #emoji-mask {
            position: absolute; font-size: 150px; transform: translate(-50%, -50%);
            display: none !important; 
            z-index: 3; text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #jutsu-ui {
            position: absolute; bottom: 40px; width: 100%; 
            display: flex; flex-direction: column; align-items: center;
            z-index: 4; pointer-events: none;
        }
        
        #status-text {
            color: #00ffff; font-size: 28px; font-weight: bold;
            text-shadow: 0 0 15px rgba(0,255,255,0.8); margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #seal-container {
            display: flex; gap: 30px;
        }

        .seal-slot {
            width: 100px; height: 100px; 
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px; background-color: rgba(0, 0, 0, 0.7);
            display: flex; justify-content: center; align-items: flex-end;
            color: #fff; font-size: 16px; font-weight: bold; text-shadow: 0 0 5px #000;
            padding-bottom: 10px; box-sizing: border-box;
            transition: all 0.3s ease;
            background-size: cover; background-position: center;
            opacity: 0.5;
        }

        #seal-1 { background-image: url('1.png'); }
        #seal-2 { background-image: url('2.png'); }
        #seal-3 { background-image: url('3.png'); }

        .seal-active {
            border-color: #00ffff;
            box-shadow: 0 0 25px #00ffff;
            color: #00ffff;
            opacity: 1;
            transform: scale(1.1);
        }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 24px; text-shadow: 0 0 10px #00ffff; z-index: 10;
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="emoji-mask">🤔</div> 
    <div id="canvas-container"></div>
    
    <div id="jutsu-ui">
        <div id="status-text">待机中：双手靠近开始结印</div>
        <div id="seal-container">
            <div class="seal-slot" id="seal-1">丑</div>
            <div class="seal-slot" id="seal-2">卯</div>
            <div class="seal-slot" id="seal-3">申</div>
        </div>
    </div>
    
    <div id="loading">连接视觉引擎中，请允许使用摄像头...</div>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==========================================
        // 音频系统
        // ==========================================
        const audios = {
            seal1: new Audio('1.mp3'),
            seal2: new Audio('2.mp3'),
            seal3: new Audio('3.mp3'),
            raikiriStart: new Audio('leiqie.mp3'), 
            kakashiVoice: new Audio('rs.mp3')      
        };
        audios.raikiriStart.loop = true;

        // ==========================================
        // Three.js 雷切引擎
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0); 
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        container.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.33, 1.266, 0.0);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const params = {
            flashSpeed: 60,       
            hdrBlueScale: 10.044, 
            arcCount: 35,         
            jaggedness: 7.878,    
            minThickness: 0.22895,
            maxThickness: 1.5705, 
            spread: 40.0,         
            coreSize: 1.4455,     
            bloomStrength: 0.33,
            bloomRadius: 1.266
        };

        const raikiriGroup = new THREE.Group();
        raikiriGroup.position.set(0, 1000, 0); 
        scene.add(raikiriGroup);

        const coreMaterial = new THREE.MeshBasicMaterial({ color: new THREE.Color(4.0, 4.0, 5.0), transparent: true, opacity: 0 });
        const core = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), coreMaterial);
        raikiriGroup.add(core);

        const lightningMaterial = new THREE.MeshBasicMaterial({
            color: new THREE.Color(1.5, 2.5, params.hdrBlueScale), 
            transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, opacity: 0
        });
        
        let lightningMesh = new THREE.Mesh(new THREE.BufferGeometry(), lightningMaterial);
        raikiriGroup.add(lightningMesh);

        function updateColors() { lightningMaterial.color.setRGB(1.5, 2.5, params.hdrBlueScale); }

        let raikiriScaleAnim = 0.0; 
        let globalTime = 0;

        function generateChaoticRibbonLightning() {
            const vertices = [];
            const indices = [];
            let vertexIndex = 0;
            
            const currentSpread = params.spread * raikiriScaleAnim;
            const currentCoreSize = params.coreSize * raikiriScaleAnim;
            
            for (let i = 0; i < params.arcCount; i++) {
                const spinePoints = [];
                let currentX = (Math.random() - 0.5) * currentCoreSize;
                let currentY = (Math.random() - 0.5) * currentCoreSize;
                let currentZ = (Math.random() - 0.5) * currentCoreSize;
                spinePoints.push(new THREE.Vector3(currentX, currentY, currentZ));
                
                const spreadX = currentX + (Math.random() - 0.5) * currentSpread;
                const spreadY = currentY + (Math.random() - 0.5) * currentSpread;
                const spreadZ = currentZ + (Math.random() - 0.5) * currentSpread;

                const segments = 5 + Math.floor(Math.random() * 8);
                
                for (let j = 1; j <= segments; j++) {
                    const t = j / segments;
                    let targetX = currentX + (spreadX - currentX) * t;
                    let targetY = currentY + (spreadY - currentY) * t;
                    let targetZ = currentZ + (spreadZ - currentZ) * t;

                    const offsetIntensity = params.jaggedness * (t * 1.5) * raikiriScaleAnim;
                    currentX = targetX + (Math.random() - 0.5) * offsetIntensity;
                    currentY = targetY + (Math.random() - 0.5) * offsetIntensity;
                    currentZ = targetZ + (Math.random() - 0.5) * offsetIntensity;
                    
                    spinePoints.push(new THREE.Vector3(currentX, currentY, currentZ));
                }

                for (let j = 0; j < spinePoints.length - 1; j++) {
                    const p1 = spinePoints[j];
                    const p2 = spinePoints[j+1];
                    const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                    const randomUp = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                    const perp = new THREE.Vector3().crossVectors(dir, randomUp).normalize();
                    
                    const progress = j / (spinePoints.length - 1);
                    const chaosFactor = Math.abs(Math.sin(j * 3.0 + globalTime * 5.0 + i)) * Math.random();
                    const thicknessRange = params.maxThickness - params.minThickness;
                    const baseThickness = params.minThickness + chaosFactor * thicknessRange; 
                    const thickness = baseThickness * (1.0 - progress * 0.7) * raikiriScaleAnim; 
                    
                    const v0 = new THREE.Vector3().copy(p1).addScaledVector(perp, thickness);
                    const v1 = new THREE.Vector3().copy(p1).addScaledVector(perp, -thickness);
                    const v2 = new THREE.Vector3().copy(p2).addScaledVector(perp, thickness);
                    const v3 = new THREE.Vector3().copy(p2).addScaledVector(perp, -thickness);
                    
                    vertices.push(v0.x, v0.y, v0.z, v1.x, v1.y, v1.z, v2.x, v2.y, v2.z, v3.x, v3.y, v3.z);
                    indices.push(vertexIndex, vertexIndex+1, vertexIndex+2, vertexIndex+1, vertexIndex+3, vertexIndex+2);
                    vertexIndex += 4;
                }
            }
            if (lightningMesh.geometry) lightningMesh.geometry.dispose();
            const newGeo = new THREE.BufferGeometry();
            newGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            newGeo.setIndex(indices);
            lightningMesh.geometry = newGeo;
        }

        let lastUpdateTime = 0;
        function animateThreeJS(currentTime) {
            requestAnimationFrame(animateThreeJS);
            globalTime += 0.05;

            if (jutsuState === 4) {
                raikiriScaleAnim += (1.0 - raikiriScaleAnim) * 0.08;
                coreMaterial.opacity = raikiriScaleAnim;
                lightningMaterial.opacity = raikiriScaleAnim;
            } else {
                raikiriScaleAnim = 0;
                coreMaterial.opacity = 0;
                lightningMaterial.opacity = 0;
            }

            const scale = params.coreSize * raikiriScaleAnim * (1 + (Math.random() * 0.15));
            core.scale.set(scale, scale, scale);

            if (currentTime - lastUpdateTime > params.flashSpeed) {
                if (jutsuState === 4) generateChaoticRibbonLightning();
                lastUpdateTime = currentTime;
                const flash = 0.8 + Math.random() * 0.6;
                lightningMaterial.color.setRGB(1.5 * flash, 2.5 * flash, params.hdrBlueScale * flash);
            }
            composer.render();
        }
        requestAnimationFrame(animateThreeJS);

        // ==========================================
        // MediaPipe 高灵敏度状态机
        // ==========================================
        const videoElement = document.getElementById('webcam');
        const uiLayer = document.getElementById('jutsu-ui');
        const statusText = document.getElementById('status-text');

        window.jutsuState = 0; 
        let lastStateChangeTime = 0;

        function advanceState(newState) {
            if (newState <= jutsuState || Date.now() - lastStateChangeTime < 800) return; 
            
            window.jutsuState = newState;
            lastStateChangeTime = Date.now();

            if (newState === 1) {
                audios.seal1.currentTime = 0; audios.seal1.play();
                document.getElementById('seal-1').classList.add('seal-active');
                statusText.innerText = "丑 (Ushi)！";
            } else if (newState === 2) {
                audios.seal2.currentTime = 0; audios.seal2.play();
                document.getElementById('seal-2').classList.add('seal-active');
                statusText.innerText = "卯 (Usagi)！";
            } else if (newState === 3) {
                audios.seal3.currentTime = 0; audios.seal3.play();
                document.getElementById('seal-3').classList.add('seal-active');
                statusText.innerText = "申 (Saru)！(查克拉充盈，左手紧握右手腕激发)";
            } else if (newState === 4) {
                statusText.innerText = "雷 切 !!!";
                
                audios.raikiriStart.currentTime = 0; 
                audios.raikiriStart.play();
                
                setTimeout(() => {
                    audios.kakashiVoice.currentTime = 0;
                    audios.kakashiVoice.play();
                }, 800);
            }
        }

        // 键盘调试防止视频录制翻车
        window.addEventListener('keydown', (e) => {
            if (e.key === '1') advanceState(1);
            if (e.key === '2') advanceState(2);
            if (e.key === '3') advanceState(3);
            if (e.key === '4') advanceState(4);
            if (e.key === '0') { 
                window.jutsuState = 0;
                audios.raikiriStart.pause();
                document.querySelectorAll('.seal-slot').forEach(el => el.classList.remove('seal-active'));
                statusText.innerText = "待机中：双手靠近开始结印";
                raikiriGroup.position.set(0, 1000, 0);
            }
        });

        function getWebcamToThreeJSMultiplier() {
            const vFov = camera.fov * Math.PI / 180;
            const height = 2 * Math.tan(vFov / 2) * camera.position.z;
            return { width: height * camera.aspect, height };
        }

        const faceDetection = new FaceDetection({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`});
        faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
        faceDetection.onResults(() => { /* 仅保持流激活，不做任何处理 */ });

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks;
                
                // --- 核心优化：大幅放宽判定逻辑 ---
                if (jutsuState < 3 && landmarks.length === 2) {
                    const hand1PalmMid = landmarks[0][9];
                    const hand2PalmMid = landmarks[1][9];
                    
                    // 计算屏幕投影距离
                    const dx = hand1PalmMid.x - hand2PalmMid.x;
                    const dy = hand1PalmMid.y - hand2PalmMid.y;
                    const palmsDistance = Math.sqrt(dx*dx + dy*dy);
                    
                    // 【极度宽松】从 0.2 放宽到 0.4！几乎只要两只手都在画面中间且不离得太远，就认作结印状态
                    if (palmsDistance < 0.4) {
                        // 节奏加快：从 1200ms 缩短到 1000ms
                        if (jutsuState === 0) advanceState(1);
                        else if (jutsuState === 1 && Date.now() - lastStateChangeTime > 1000) advanceState(2);
                        else if (jutsuState === 2 && Date.now() - lastStateChangeTime > 1000) advanceState(3);
                    }
                }

                if (jutsuState === 3) {
                    if (landmarks.length === 2) {
                        const hand1 = landmarks[0];
                        const hand2 = landmarks[1];
                        
                        // 判定条件：掌心靠近手腕。
                        const dist1 = Math.sqrt(Math.pow(hand1[9].x-hand2[0].x,2) + Math.pow(hand1[9].y-hand2[0].y,2));
                        const dist2 = Math.sqrt(Math.pow(hand2[9].x-hand1[0].x,2) + Math.pow(hand2[9].y-hand1[0].y,2));
                        
                        // 【爆发极度宽松】：从 0.15 放宽到 0.25！
                        if (dist1 < 0.25 || dist2 < 0.25) {
                            advanceState(4);
                        }
                    }
                }

                if (jutsuState === 4) {
                    let mainHand = landmarks[0];
                    if (landmarks.length === 2) {
                        mainHand = (landmarks[0][9].y < landmarks[1][9].y) ? landmarks[0] : landmarks[1];
                    }
                    
                    const planes = getWebcamToThreeJSMultiplier();
                    const mappedX = (0.5 - mainHand[9].x) * planes.width;
                    const mappedY = (0.5 - mainHand[9].y) * planes.height;
                    
                    raikiriGroup.position.x += (mappedX - raikiriGroup.position.x) * 0.4;
                    raikiriGroup.position.y += (mappedY - raikiriGroup.position.y) * 0.4;
                }
            } else {
                if (jutsuState === 4) raikiriGroup.position.set(0, 1000, 0);
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceDetection.send({image: videoElement});
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        cameraUtils.start().catch(err => alert("摄像头启动失败！"));

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
